name: Floor Release Held Sends (Dev)

on:
  schedule:
    # Release held client sends after 30s undo window (every 2 minutes)
    - cron: '*/2 * * * *'
  workflow_dispatch:

env:
  FLOOR_DEV_SUPABASE_URL: https://klnygbbmognbslgobmzc.supabase.co

jobs:
  release-held-sends-dev:
    name: Floor release held sends (dev)
    runs-on: ubuntu-latest

    steps:
      - name: Run floor-release-held-sends sweeper
        id: release
        env:
          SERVICE_KEY: ${{ secrets.FLOOR_DEV_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.FLOOR_DEV_CRON_SECRET }}
        run: |
          if [ -z "$SERVICE_KEY" ] || [ -z "$CRON_SECRET" ]; then
            echo "::error::Set FLOOR_DEV_SERVICE_ROLE_KEY and FLOOR_DEV_CRON_SECRET repository secrets"
            exit 1
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            "${FLOOR_DEV_SUPABASE_URL}/functions/v1/floor-release-held-sends" \
            -H "Authorization: Bearer ${SERVICE_KEY}" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY_OUT=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY_OUT"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::floor-release-held-sends failed with status $HTTP_CODE"
            exit 1
          fi

          STUCK=$(python3 -c "import json,sys; print(json.load(sys.stdin).get('stuck_count',0))" <<<"$BODY_OUT")
          if [ "$STUCK" -gt 0 ]; then
            echo "::warning::stuck held sends detected: $STUCK"
          fi

          echo "result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY_OUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "## Floor release held sends (dev)" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.release.outputs.result }}' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
