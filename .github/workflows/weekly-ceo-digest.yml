# Weekly CEO Digest Scheduler
#
# Triggers the weekly-ceo-digest edge function on a schedule.
# Runs every Monday at 8:00 AM ET (13:00 UTC).
#
# Required GitHub Secrets:
# - CRON_SECRET: Secret key matching CRON_SECRET in Supabase Edge Functions
# - SUPABASE_URL: Your Supabase project URL
# - CEO_MASTER_WORKSPACE_ID: The agency workspace with is_ceo_master=TRUE
#
# CEO Master Mode:
# When is_ceo_master=TRUE is set on a workspace's ceo_digest_settings,
# the function aggregates metrics from ALL agencies in a single digest.
# Only ONE call is needed - the master workspace handles aggregation.

name: Weekly CEO Digest

on:
  schedule:
    # Run every Monday at 8:00 AM Eastern Time
    # Note: GitHub Actions uses UTC, so 8:00 AM ET = 13:00 UTC (EST) or 12:00 UTC (EDT)
    # Using 13:00 UTC to cover both EST and EDT
    - cron: '0 13 * * 1'

  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      force:
        description: 'Force resend even if already sent this week'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      test_mode:
        description: 'Test mode (skip actual email sending)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      agency_workspace_id:
        description: 'Specific agency workspace ID (optional, leave empty for all)'
        required: false
        type: string

jobs:
  trigger-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Weekly CEO Digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CEO_MASTER_WORKSPACE_ID: ${{ secrets.CEO_MASTER_WORKSPACE_ID }}
        run: |
          # Determine parameters
          FORCE="${{ github.event.inputs.force || 'false' }}"
          TEST_MODE="${{ github.event.inputs.test_mode || 'false' }}"
          SPECIFIC_AGENCY="${{ github.event.inputs.agency_workspace_id }}"

          # Use specific agency if provided, otherwise use CEO master workspace
          AGENCY_ID="${SPECIFIC_AGENCY:-$CEO_MASTER_WORKSPACE_ID}"

          echo "Starting weekly CEO digest trigger..."
          echo "Force: $FORCE"
          echo "Test Mode: $TEST_MODE"
          echo "CEO Master Workspace: $AGENCY_ID"

          # Build URL with query parameters
          URL="${SUPABASE_URL}/functions/v1/weekly-ceo-digest?agency_workspace_id=${AGENCY_ID}"

          if [ "$FORCE" = "true" ]; then
            URL="${URL}&force=true"
          fi

          if [ "$TEST_MODE" = "true" ]; then
            URL="${URL}&test=true"
          fi

          echo ""
          echo "Calling CEO digest function..."

          # Make the request
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: $CRON_SECRET")

          # Extract HTTP status code (last line)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          # Extract response body (all but last line)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo ""
            echo "========================================="
            echo "CEO Digest triggered successfully!"
            echo "========================================="
          else
            echo ""
            echo "::error::CEO Digest failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Report Results
        if: always()
        run: |
          echo "Weekly CEO Digest trigger completed."
          echo "Workflow run: ${{ github.run_id }}"
          echo "Trigger: ${{ github.event_name }}"

  # Optional: Send Slack notification on failure
  notify-on-failure:
    needs: trigger-digest
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send Failure Notification
        run: |
          echo "The weekly CEO digest workflow failed."
          echo "Check the GitHub Actions logs for details."
          # Add Slack/email notification here if needed
          # Example with Slack:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Weekly CEO Digest workflow failed!"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
