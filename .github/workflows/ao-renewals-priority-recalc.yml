name: AO Renewals Priority Recalculation

on:
  schedule:
    # Run daily at 6:00 AM ET (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  recalculate-priorities:
    runs-on: ubuntu-latest
    steps:
      - name: Recalculate AO Renewals Priorities
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/recalculate-ao-priorities" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Code: $http_code"

          if [ "$http_code" != "200" ]; then
            echo "Error: Request failed with status $http_code"
            exit 1
          fi

          echo "Successfully recalculated priorities"
