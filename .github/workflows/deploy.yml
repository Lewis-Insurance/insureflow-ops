name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` refuses a lockfile that is out of sync with package.json, so
        # this step doubles as the lockfile-drift guard (it caught PR #78).
        run: npm ci --legacy-peer-deps

      - name: Run tests
        # Enforces the whole vitest suite, including the ACORD client/server
        # parity test. A red test now blocks the merge instead of 409-ing in prod.
        run: npm run test:run
        env:
          VITE_SUPABASE_URL: https://lrqajzwcmdwahnjyidgv.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: https://lrqajzwcmdwahnjyidgv.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CANOPY_PUBLIC_ALIAS: lewis-insurance
          VITE_ENABLE_SIGNUP: 'false'
          VITE_REQUIRE_MFA: 'false'
          VITE_REQUIRE_PHONE: 'false'
          VITE_MIN_PW_LEN: '8'

      - name: Success
        run: echo "✅ Build successful! Netlify will deploy automatically."

# Note: Netlify auto-deploys on push to main
# This workflow validates that tests pass and the build works.
