name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: https://lrqajzwcmdwahnjyidgv.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_CANOPY_PUBLIC_ALIAS: lewis-insurance
          VITE_ENABLE_SIGNUP: 'false'
          VITE_REQUIRE_MFA: 'false'
          VITE_REQUIRE_PHONE: 'false'
          VITE_MIN_PW_LEN: '8'

      - name: Success
        run: echo "✅ Build successful! Netlify will deploy automatically."

# Note: Netlify auto-deploys on push to main
# This workflow just validates the build works
