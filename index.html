<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Pre-paint theme: next-themes only swaps the class after the bundle
      // mounts, so without this a light-theme user sees a dark flash on every
      // load. Mirrors next-themes' storage key + system behavior.
      (function () {
        try {
          var t = localStorage.getItem('theme');
          // No stored choice -> the app's defaultTheme (dark), NOT system,
          // so first paint matches what next-themes will mount with.
          if (!t) t = 'dark';
          if (t === 'system') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.classList.remove('dark', 'light');
          document.documentElement.classList.add(t === 'light' ? 'light' : 'dark');
        } catch (e) {}
      })();
    </script>
